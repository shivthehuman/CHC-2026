<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@shivthehuman | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#f97316', 600: '#ea580c' } } // E-commerce Orange
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50 min-h-screen flex flex-col transition-colors duration-300">

    <!-- Navbar -->
    <nav
        class="sticky top-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <!-- Shopping Bag PNG Logo -->
                <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" alt="Logo"
                    class="h-8 w-8 object-contain drop-shadow-md">
                <h1 class="text-2xl font-bold tracking-tight">@shiv<span class="text-brand-500">store</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeBtn"
                    class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <i id="themeIcon" class="fa-solid fa-sun text-yellow-400 text-lg"></i>
                </button>
                <div class="relative cursor-pointer">
                    <i class="fa-solid fa-cart-shopping text-xl text-slate-600 dark:text-slate-300"></i>
                    <span
                        class="absolute -top-2 -right-2 bg-brand-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- Promotional Hero Banner -->
        <div class="mb-10 relative rounded-3xl overflow-hidden shadow-2xl group">
            <!-- Premium High-Res PNG/JPG Image Background -->
            <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=2000&q=80"
                alt="Sale Banner"
                class="w-full h-[250px] sm:h-[350px] object-cover transition-transform duration-700 group-hover:scale-105">
        
            <!-- Apple-style Sleek Overlay with Instagram Gradient Button -->
            <div
                class="absolute inset-0 bg-gradient-to-r from-slate-900/90 via-slate-900/50 to-transparent flex flex-col justify-center p-8 sm:p-12">
                <span class="text-brand-500 font-bold tracking-widest uppercase text-xs sm:text-sm mb-2 drop-shadow-lg">Prime
                    Exclusive</span>
                <h2 class="text-3xl sm:text-5xl font-extrabold text-white mb-4 max-w-lg leading-tight drop-shadow-lg">Next-Gen
                    Tech is Here.</h2>
                <p class="text-slate-200 max-w-md mb-8 text-sm sm:text-base drop-shadow-md">Experience the future with our new
                    arrival of premium gadgets. Up to 40% off for @shivthehuman members.</p>
                <div>
                    <!-- Instagram Style Gradient Button -->
                    <button
                        class="bg-gradient-to-r from-brand-500 to-pink-500 hover:from-brand-400 hover:to-pink-400 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-brand-500/30 transition-all active:scale-95 flex items-center gap-2">
                        Shop the Sale <i class="fa-solid fa-arrow-right text-sm"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
                <h2 class="text-3xl font-bold mb-2">Discover Products</h2>
                <p class="text-slate-500 dark:text-slate-400">Handpicked premium items just for you.</p>
            </div>
            <span
                class="px-4 py-2 bg-brand-50 dark:bg-brand-900/20 text-brand-600 dark:text-brand-400 rounded-lg font-semibold border border-brand-200 dark:border-brand-800">
                <i class="fa-solid fa-bolt mr-2"></i>Flash Sale
            </span>
        </div>

        <!-- Product Grid -->
        <section>
            <!-- Loading Skeletons -->
            <div id="loader" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

            <!-- Actual Products -->
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
            </div>
        </section>

    </main>

    <!-- Branding Footer -->
    <footer
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full border-t border-slate-200 dark:border-slate-700 text-center mt-auto">
        <p class="text-slate-600 dark:text-slate-400 mb-4 font-medium">Developed with ❤️ by @shivthehuman</p>
        <div class="flex justify-center gap-6">
            <a href="#" target="_blank" rel="noopener noreferrer"
                class="text-slate-400 hover:text-brand-500 hover:-translate-y-1 transition-all duration-300 text-2xl"><i
                    class="fa-brands fa-linkedin"></i></a>
            <a href="https://github.com/shivthehuman" target="_blank" rel="noopener noreferrer"
                class="text-slate-400 hover:text-brand-500 hover:-translate-y-1 transition-all duration-300 text-2xl"><i
                    class="fa-brands fa-github"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer"
                class="text-slate-400 hover:text-brand-500 hover:-translate-y-1 transition-all duration-300 text-2xl"><i
                    class="fa-brands fa-x-twitter"></i></a>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
