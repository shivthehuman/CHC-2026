<body>
    <div>
        <input id="todoinput" type="text" placeholder="Enter your todo" />
        <button id="createButton">create</button>
    </div>
    <div>
        <ul id="todoContainer">
            <!-- <li>already exist Todo : not removed</li>
            <li>another existing todo : not removed</li> -->
        </ul>
    </div>
    <script>
        const createButtonRef = document.getElementById("createButton");
        const todoInputRef = document.getElementById('todoinput');
        const todoContainerRef = document.getElementById('todoContainer');

        (async () => {
            fetch('https://api.freeapi.app/api/v1/public/quotes', {
                method: 'GET',
            })
                .then(response => response.json()) //JSON = convert in object
                .then((data) => {
                    for (const obj of data.data.data) {
                        const li = document.createElement("li");
                        li.innerText = obj.content;
                        todoContainerRef.appendChild(li);
                    }
                });
        })();

        createButtonRef.addEventListener('click', function () {
            const value = todoInputRef.value;
            console.log(value);

            const li = document.createElement('li') // createElement li
            li.innerText = value;

            //remove todo when clicked on them
            li.addEventListener('click', function () {
                li.remove();
            })
            todoContainerRef.appendChild(li);
            todoInputRef.value = '';
        });

        //WE LEARN DOM ;; 



    </script>
</body>
